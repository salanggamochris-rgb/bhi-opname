<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Stock Opname BHI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container bg-white p-4 rounded shadow" style="max-width: 400px; margin-top: 50px;">
        <h3 class="text-center text-primary mb-4">Warehouse BHI</h3>
        <h5 class="text-center mb-3">Masuk Sistem Opname</h5>
        
        <form action="/scan" method="GET">
            <div class="mb-3">
                <label class="form-label">Nama Lengkap Anda</label>
                <input type="text" name="username" class="form-control" placeholder="Contoh: Budi" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Pilih Zona Kerja</label>
                <select name="zona" class="form-control" required>
                    {% for z in zonas %}
                    <option value="{{ z }}">{{ z }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Mulai Scan</button>
        </form>
    </div>
</body>
</html>
