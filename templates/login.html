<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Sistem Opname - Warehouse BHI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="text-primary fw-bold text-center mb-2">Warehouse BHI</h1>
        <h4 class="text-secondary text-center mb-4">Masuk Sistem Opname</h4>
        
        <form action="/scan" method="POST">
            <div class="mb-3">
                <label for="petugas" class="form-label fw-bold">Nama Lengkap Anda</label>
                <input type="text" class="form-control form-control-lg" id="petugas" name="petugas" placeholder="Contoh: Chris" required>
            </div>

            <div class="mb-3">
                <label for="zona" class="form-label fw-bold">Pilih Zona Kerja</label>
                <select class="form-select form-control-lg" id="zona" name="zona" required>
                    <option value="" disabled selected>-- Pilih Zona (Sesuai Input Super User) --</option>
                    {% for zona in master_zona %}
                    <option value="{{ zona }}">{{ zona }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4">
                <label for="sublokasi" class="form-label fw-bold">Sublokasi / Rak</label>
                <input type="text" class="form-control form-control-lg" id="sublokasi" name="sublokasi" placeholder="Contoh: AD-3" required style="text-transform: uppercase;">
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Mulai Scan</button>
        </form>
    </div>
</body>
</html>
