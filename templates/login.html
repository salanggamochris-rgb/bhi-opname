<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Petugas - BHI Opname</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="text-center mb-4">
                <span class="fs-1">📦</span>
                <h4 class="fw-bold text-dark mt-2">Warehouse BHI</h4>
                <p class="text-muted small">Masuk Sistem Opname</p>
            </div>
            <form action="/scan" method="GET" id="loginForm">
                <div class="mb-3">
                    <label for="petugas" class="form-label fw-bold text-secondary">Nama Lengkap Anda</label>
                    <input type="text" class="form-control form-control-lg" id="petugas" name="petugas" placeholder="Ketik nama Anda..." required autocomplete="off">
                </div>
                <div class="mb-4">
                    <label for="zona" class="form-label fw-bold text-secondary">Pilih Zona Kerja</label>
                    <select class="form-select form-control-lg" id="zona" name="zona" required>
                        <option value="" disabled selected>-- Pilih Zona --</option>
                        
                        {% for z in list_zona %}
                        <option value="{{ z }}">{{ z }}</option>
                        {% endfor %}
                        
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm py-2">Masuk ke Scanner</button>
            </form>
            <div class="text-center mt-4">
                <a href="/super-user" class="text-decoration-none small text-muted">🛡️ Kelola Sistem / Super User Panel</a>
            </div>
        </div>
    </div>
    <script>
        window.onload = function() {
            document.getElementById('petugas').focus();
        };
    </script>
</body>
</html>
